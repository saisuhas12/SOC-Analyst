<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SOC Sentinel XDR</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Theme Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="login-bg">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card cyber-card login-card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-success" style="font-size: 3.5rem;"></i>
                <h2 class="text-success mt-2 font-display fw-bold">SOC SENTINEL</h2>
                <h5 class="text-muted font-display text-uppercase" style="font-size: 0.8rem; letter-spacing: 2px;">Threat Monitoring Platform</h5>
            </div>

            <!-- Flash messages specifically for login -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-cyber alert-{{ category }} alert-dismissible fade show p-2 text-mono" style="font-size: 0.8rem;" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close btn-close-white p-2" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('auth.login') }}" method="POST" autocomplete="off">
                <div class="mb-3">
                    <label for="username" class="form-label filter-label">Analyst Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control form-control-cyber" id="username" name="username" placeholder="Enter username" required autofocus>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label filter-label">Secret Key / Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control form-control-cyber" id="password" name="password" placeholder="Enter password" required>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-cyber py-2">
                        <i class="bi bi-unlock-fill me-2"></i>Authenticate Session
                    </button>
                </div>
            </form>
            
            <div class="mt-4 pt-2 text-center border-top border-secondary">
                <p class="text-muted text-mono mb-0" style="font-size: 0.7rem;">
                    Authorized Personnel Only. Activating session establishes auditable footprint.
                </p>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
