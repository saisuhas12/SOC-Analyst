services:
  # PostgreSQL Database Service
  - type: db
    name: soc-sentinel-db
    plan: free
    ipAllowList: [] # Private network access only

  # Web Application hosting
  - type: web
    name: soc-sentinel-xdr
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn run:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soc-sentinel-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/app/static/uploads/logs
      - key: PYTHON_VERSION
        value: 3.11.8
    disk:
      name: soc-uploads-storage
      mountPath: /opt/render/project/src/app/static/uploads
      sizeGB: 1
